<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Insurance Charges Prediction</title>
</head>
<body>
  <h1>Predict Insurance Charges</h1>

  <form method="POST" action="/predict">
    <label>age:</label><input type="number" name="age" value="19" required><br><br>

    <label>sex:</label>
    <select name="sex">
      <option value="female" selected>female</option>
      <option value="male">male</option>
    </select><br><br>

    <label>bmi:</label><input type="number" step="0.1" name="bmi" value="27.9" required><br><br>

    <label>children:</label><input type="number" name="children" value="0" required><br><br>

    <label>smoker:</label>
    <select name="smoker">
      <option value="yes" selected>yes</option>
      <option value="no">no</option>
    </select><br><br>

    <label>region:</label>
    <select name="region">
      <option value="southwest" selected>southwest</option>
      <option value="southeast">southeast</option>
      <option value="northwest">northwest</option>
      <option value="northeast">northeast</option>
    </select><br><br>

    <button type="submit">Predict</button>
  </form>

  {% if prediction is defined %}
    <h2>Prediction: {{ prediction }}</h2>
  {% endif %}
</body>
</html>
